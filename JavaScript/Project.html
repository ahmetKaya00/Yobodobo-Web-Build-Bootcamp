<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .todo-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 5px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .todo-item.completed .task-title {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>
    <div class="todo-container">
        <h3 class="text-center mb-4">To-Do List</h3>
        <form id="todoForm">
            <div class="mb-3">
                <input type="text" id="todoInput" class="form-control" placeholder="Add a new task">
            </div>
            <div class="mb-3">
                <input type="datetime-local" id="dueDate" class="form-control" placeholder="Add a new task">
            </div>
            <button type="submit" class="btn btn-primary w-100">Add Task</button>
        </form>
        <ul id="todoList" class="list-group mt-4">

        </ul>
    </div>

    <script>
        document.getElementById('todoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            addTask();
        });
        function addTask(){
            const todoInput = document.getElementById('todoInput').value;
            const dueDate = document.getElementById('dueDate').value;
            const taskItem = document.createElement('li');
            taskItem.className = 'list-group-item todo-item';
            taskItem.innerHTML = `
                <div>
                    <span class="task-title">${todoInput}</span>
                    <br>
                    <small class="text-muted">Bitiş Tarihi: ${dueDate}</small>
                </div>
                <div>
                    <button class="btn btn-sm btn-success" onclick="completeTask(this)">Tamamla</button>
                    <button class="btn btn-sm btn-warning delete-btn" onclick="UpdateTask(this)">Güncelle</button>
                    <button class="btn btn-sm btn-danger delete-btn" onclick="deleteTask(this)">Sil</button>
                </div>
            `;
            document.getElementById('todoList').appendChild(taskItem);
            document.getElementById('todoForm').reset();
            scheduleReminder(todoInput, dueDate);
        }

        function completeTask(button) {
            const taskItem = button.closest('.todo-item');
            taskItem.classList.toggle('completed');
        }
        function UpdateTask(button) {
            const taskItem = button.closest('.todo-item');
            const taskTitle = taskItem.querySelector('.task-title').textContent;
            const dueDate = taskItem.querySelector('small').textContent.replace('Bitiş Tarihi: ', '');

            document.getElementById('todoInput').value = taskTitle;
            document.getElementById('dueDate').value = dueDate;
            taskItem.remove();
        }
        function deleteTask(button) {
            const taskItem = button.closest('.todo-item');
            taskItem.remove();
        }

        function scheduleReminder(task, dueDate) {
            const dueTime = new Date(dueDate).getTime();
            const currentTime = new Date().getTime();
            const delay = dueTime - currentTime;

            if (delay > 0) {
                setTimeout(() => {
                    alert(`Reminder: ${task}`);
                }, delay);
            }
        }
    </script>
</body>
</html>
