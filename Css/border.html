<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
        }
        .box {
            width: 400px;
            height: 400px;
            background-color: #065D76;
            border: 5px solid #d77214;
            margin: 15px auto;
            padding: 5px;
        }
        .rounded-box {
            width: 100px;
            height: 100px;
            background-color: #d77214;
            border: 5px solid #065D76;
            border-radius: 15px 50px;
        }
        </style>
</head>
<body>
    <div class="box">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Rem ratione unde dolor reiciendis, molestias quas placeat tempore laboriosam natus illum, incidunt recusandae assumenda reprehenderit architecto at nulla iste, error asperiores.</div>
    <div class="rounded-box"></div>
</body>
</html>
