<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #065D76;
        }
        h1{
            color: red;
        }
        p{
            color: rgb(0, 128, 0);
        }
        .highlight{
            background-color: rgba(255, 0, 0, 0.2);
        }
        #hsl-color{
            color: hsl(240, 100%, 50%);
        }
    </style>
</head>
<body>
    <h1>Renkler</h1>
    <p>Renkler sayfası içeriği burada yer alır.</p>
    <p class="highlight">Bu paragraf highlight sınıfına sahiptir.</p>
    <p id="hsl-color">Renk Geçişi</p>
</body>
</html>
