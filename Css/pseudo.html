<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .button {
            padding: 10px 20px;
            background-color: #065D76;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #d77214;
        }
        .button:active {
                background-color: #d77214;
                transform: translateY(2px);
            }
        .button:focus {
                outline: 2px solid #d77214;
            }
        li:nth-child(3n) {
                background-color: #f0f0f0;
            }
    </style>
</head>
<body>
    <a href="" class="button">Tıkla</a>
    <br>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>

    </ul>
</body>
</html>
